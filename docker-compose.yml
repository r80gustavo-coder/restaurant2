version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: always

# Para rodar o banco de dados (Supabase) no próprio VPS, 
# você pode usar a imagem oficial do Supabase (Self-Hosted).
# Veja a documentação oficial: https://supabase.com/docs/guides/self-hosting/docker
